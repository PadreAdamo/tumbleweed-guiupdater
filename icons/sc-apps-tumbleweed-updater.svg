<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <clipPath id="tw-clip">
      <circle cx="24" cy="17" r="13"/>
    </clipPath>
  </defs>

  <!-- Tumbleweed: three ellipses at 0°/60°/120° clipped to a circle,
       suggesting the tangled stem structure of a dried bramble ball -->
  <g clip-path="url(#tw-clip)" fill="none" stroke="#bf7020"
     stroke-width="1.5" stroke-linecap="round">
    <ellipse cx="24" cy="17" rx="13" ry="5.5"/>
    <ellipse cx="24" cy="17" rx="13" ry="5.5" transform="rotate(60 24 17)"/>
    <ellipse cx="24" cy="17" rx="13" ry="5.5" transform="rotate(120 24 17)"/>
  </g>
  <!-- Outer circle -->
  <circle cx="24" cy="17" r="13" fill="none" stroke="#bf7020"
          stroke-width="2" stroke-linecap="round"/>

  <!-- Download arrow in Breeze blue — indicates "update available" -->
  <line x1="24" y1="32" x2="24" y2="40"
        stroke="#3daee9" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 17 38 L 24 46 L 31 38 Z" fill="#3daee9" stroke="none"/>
</svg>
